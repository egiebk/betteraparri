# Government Services Data
# This file contains all service categories for the government portal.
# Each category's index.yaml file is located at content/services/{slug}/index.yaml.

categories:
  - category: 'Civil Registry'
    slug: 'civil-registry'
    description: 'Register births, marriages, and deaths, and request certified copies from the Local Civil Registrar.'
    icon: 'ri-file-list-3-line'

  - category: 'Business and Permits'
    slug: 'business'
    description: 'Apply for business permits, renew registrations, secure mayor permits, and request market or franchise-related assistance.'
    icon: 'ri-building-2-line'

  - category: 'Taxes and Payments'
    slug: 'taxes-payments'
    description: 'Pay real property taxes, business taxes, community tax certificates, and other local fees.'
    icon: 'ri-bank-card-line'

  - category: 'Social Services'
    slug: 'social-welfare'
    description: 'Request medical, burial, financial, senior citizen, PWD, solo parent, and other social assistance.'
    icon: 'ri-open-arm-line'

  - category: 'Health Services'
    slug: 'health-services'
    description: 'Find RHU consultations, immunization, maternal and child health, certificates, and sanitary permit services.'
    icon: 'ri-hospital-line'

  - category: 'Agriculture and Fisheries'
    slug: 'agriculture-fisheries'
    description: 'Register as a farmer or fisherfolk and access agricultural, fishery, livelihood, equipment, or disaster assistance.'
    icon: 'ri-plant-line'

  - category: 'Engineering and Zoning'
    slug: 'engineering-zoning'
    description: 'Apply for building, occupancy, excavation, fencing, and zoning services or report public works concerns.'
    icon: 'ri-tools-line'

  - category: 'Disaster and Emergency'
    slug: 'disaster-emergency'
    description: 'Find emergency hotlines, evacuation information, disaster assistance, hazard reporting, and preparedness guides.'
    icon: 'ri-alarm-warning-line'

  - category: 'Education and Livelihood'
    slug: 'education-livelihood'
    description: 'Apply for scholarships, job referrals, skills training, youth programs, and livelihood opportunities.'
    icon: 'ri-graduation-cap-line'

  - category: 'Complaints and Requests'
    slug: 'complaints-requests'
    description: 'File complaints, request public information, report infrastructure issues, submit feedback, or route barangay concerns.'
    icon: 'ri-chat-check-line'
